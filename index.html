<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <!-- Landing Screen -->
    <div id="start-screen">
        <h1 class="scroll-down"> LET's play Tic-Tac-Toe</h1>
    <div class="pick-mark">
    <p>Pick Player 1's Mark</p>
    <div class="toggle">
        <button id="select-x" class="active">X</button>
        <button id="select-o">O</button>
    </div>
    <p class="note">Remember: X goes first</p>
</div>

<!-- Difficulty Selection -->
<div class="difficulty">
    <p>Select AI Difficulty</p>
    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>
</div>

<button class="btn yellow" onclick="startGame('cpu')">New Game (vs CPU)</button>
<button class="btn blue" onclick="startGame('player')">New Game (vs Player)</button>

        <div class="scroll-down">
            <h1>XO</h1>
        </div>
    </div>


    <!-- Game Board -->
    <div id="game-screen" class="hidden">
        <div class="header">
            <h2 class="logo">XO</h2>
            <p id="turn-indicator">X's Turn</p>
            <button id="restart-btn">⟳</button>
        </div>
        <div class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="scoreboard">
            <p>X (You) <span id="score-x">0</span></p>
            <p>Ties <span id="score-ties">0</span></p>
            <p>O (CPU) <span id="score-o">0</span></p>
        </div>
    </div>
    

    <!-- Winner Popup (Modal) -->
<!-- Winner Popup (Modal) -->
<div id="winner-screen" class="popup">
    <div class="popup-content">
        <p id="winner-text">X Takes the Round!</p>
        <button class="btn red" onclick="quitGame()">Quit Game</button>
        <button class="btn yellow" onclick="nextRound()">Next Round</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
